<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Battle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <!-- Left Pane: Configuration Panel -->
        <div class="left-pane">
            <div class="left-pane-inner">
                <div class="config-pane">

                <!-- API Configuration Section -->
                <div class="config-section">
                    <div class="input-group">
                        <label for="api-url">API URL</label>
                        <input type="text" id="api-url" value="https://api.tokenfactory.nebius.com/v1/" placeholder="Enter API URL">
                    </div>
                    <div class="input-group">
                        <label for="api-key">API Key</label>
                        <input type="password" id="api-key" placeholder="Paste your API key here">
                    </div>
                    <button id="load-models-btn" class="btn btn-primary">
                        <span class="btn-icon">⚡</span>
                        Load Models
                    </button>
                    <div id="loading" class="loading hidden">
                        <div class="spinner"></div>
                        <span>Loading models...</span>
                    </div>
                    <div id="error-message" class="error hidden"></div>
                </div>

                <!-- Model Selection Section -->
                <div id="model-selection" class="config-section">
                    <div class="player-model-section">
                        <div class="player-label">🔴 Player 1 (Red Snake)</div>
                        <div class="searchable-dropdown">
                            <div class="searchable-dropdown-input-wrapper">
                                <input type="text" id="player1-model-search" class="model-search-input"
                                       placeholder="Search or select a model..."
                                       autocomplete="off">
                                <span class="dropdown-arrow">▼</span>
                            </div>
                            <div class="dropdown-options hidden" id="player1-model-options"></div>
                        </div>
                    </div>

                    <div class="player-model-section">
                        <div class="player-label">🔵 Player 2 (Blue Snake)</div>
                        <div class="searchable-dropdown">
                            <div class="searchable-dropdown-input-wrapper">
                                <input type="text" id="player2-model-search"
                                       class="model-search-input"
                                       placeholder="Search or select a model..."
                                       autocomplete="off">
                                <span class="dropdown-arrow">▼</span>
                            </div>
                            <div class="dropdown-options hidden" id="player2-model-options"></div>
                        </div>
                    </div>
                </div>

                <!-- Game Controls Section -->
                <div class="config-section game-controls-section">
                    <div class="game-control-bar">
                        <button id="start-battle-btn" class="btn btn-success btn-small" title="Start a new game">
                            Start
                        </button>
                        <button id="pause-btn" class="btn btn-control btn-small" title="Pause the current game">
                            <span class="btn-icon">⏸️</span>
                        </button>
                        <button id="restart-btn" class="btn btn-control btn-small" title="Restart the current game">
                            <span class="btn-icon">🔄</span>
                        </button>
                        <label class="debug-checkbox-wrapper debug-compact">
                            <input type="checkbox" id="loop-checkbox" checked>
                            <span class="debug-checkbox-label">Loop</span>
                        </label>
                    </div>
                </div>

                <!-- Options Section -->
                <div class="config-section collapsible-section" id="options-section">
                    <div class="section-header">
                        <button class="collapse-toggle" data-section="options-section" title="Toggle Options">
                            <span class="collapse-icon">▶</span>
                        </button>
                        <h3 class="section-title">⚙️ Options</h3>
                    </div>

                    <div class="section-content collapsed" id="options-content" style="max-height: 0;">
                        <div class="option-row" style="background: transparent; border: none; padding: 0; margin-bottom: 15px; margin-top: 10px; align-items: center;">
                            <label for="view-radius-input" class="option-label">Visibility Radius:</label>
                            <input type="number" id="view-radius-input" class="option-input" min="1" max="30" value="5">
                        </div>
                        <div style="font-size: 11px; color: #888; margin-top: -10px; margin-bottom: 15px; padding-left: 10px;">
                            (1-30, 5=default, 30=full grid)
                        </div>

                        <label class="debug-checkbox-wrapper debug-compact">
                            <input type="checkbox" id="collision-avoidance-checkbox" checked>
                            <span class="debug-checkbox-label">🛡️ Collision Avoidance</span>
                        </label>

                        <label class="debug-checkbox-wrapper debug-compact">
                            <input type="checkbox" id="debug-checkbox">
                            <span class="debug-checkbox-label">🐛 Debug Mode</span>
                        </label>
                    </div>
                </div>

                <!-- Extra Section -->
                <div class="config-section collapsible-section" id="extra-section">
                    <div class="section-header">
                        <button class="collapse-toggle" data-section="extra-section" title="Toggle Extra">
                            <span class="collapse-icon">▶</span>
                        </button>
                        <h3 class="section-title">🔧 Extra</h3>
                    </div>

                    <div class="section-content collapsed" id="extra-content" style="max-height: 0;">
                        <div class="benchmark-buttons-container" style="margin-top: 10px;">
                            <button id="benchmark-btn" class="btn btn-warning btn-small" title="Run speed test on all loaded models">
                                ⚡ Speed Test
                            </button>
                            <button id="show-results-btn" class="btn btn-info btn-small btn-disabled" title="Show benchmark results (run speed test first)">
                                📈 Show Results
                            </button>
                        </div>

                        <div class="sort-buttons-container">
                            <span class="sort-buttons-label">Models:</span>
                            <button id="sort-by-name-btn" class="btn btn-secondary btn-small" title="Sort models alphabetically by name">
                                Sort by Name
                            </button>
                            <button id="sort-by-speed-btn" class="btn btn-secondary btn-small btn-disabled" title="Sort models by speed (run speed test first)">
                                Sort by Speed
                            </button>
                        </div>
                    </div>
                </div>
                </div>
            </div>
        </div>

        <!-- Right Pane: Game Visuals -->
        <div class="right-pane">
            <h1 class="game-pane-title">🐍🐍 Snake Battle 🐍🐍</h1>
            <div class="game-pane">
                <!-- Timer Display -->
                <div class="timer-display stats-panel-timer" id="game-timer">
                    <span class="timer-icon">⏱️</span>
                    <span class="timer-value">0:00</span>
                </div>

                <!-- Game Area -->
                <div class="game-layout">
                    <div class="game-left-panel">
                        <div class="fruit-legend">
                            <h3>Fruit Legend</h3>
                            <div id="fruit-legend-content"></div>
                        </div>
                    </div>
                    <div class="game-center-panel">
                        <div class="game-canvas-container">
                            <canvas id="game-canvas"></canvas>
                        </div>
                    </div>
                    <div class="game-right-panel">
                        <div class="game-log-panel" id="game-log-container">
                            <h3>Game Log</h3>
                            <div id="log-content"></div>
                        </div>
                    </div>
                </div>

                <!-- Stats Panel -->
                <div class="stats-panel">
                    <div class="player-card">
                        <div class="player-model">
                            <span class="player-dot red"></span>
                            <span id="p1-model-name">Player 1</span>
                            <span id="p1-model-stats" class="player-stats-text">length: 3, moves: 0</span>
                        </div>
                        <div class="latency-timegraph">
                            <div class="latency-graph-container">
                                <div class="latency-graph-title">Latency</div>
                                <canvas id="p1-latency-canvas" width="280" height="60"></canvas>
                            </div>
                        </div>
                        <div class="latency-stats" id="p1-latency-stats"></div>
                    </div>

                    <div class="vs">VS</div>

                    <div class="player-card">
                        <div class="player-model">
                            <span class="player-dot blue"></span>
                            <span id="p2-model-name">Player 2</span>
                            <span id="p2-model-stats" class="player-stats-text">length: 3, moves: 0</span>
                        </div>
                        <div class="latency-timegraph">
                            <div class="latency-graph-container">
                                <div class="latency-graph-title">Latency</div>
                                <canvas id="p2-latency-canvas" width="280" height="60"></canvas>
                            </div>
                        </div>
                        <div class="latency-stats" id="p2-latency-stats"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Benchmark Results Modal -->
    <div id="benchmark-modal" class="benchmark-modal hidden">
        <div class="benchmark-modal-content">
            <div class="benchmark-modal-header">
                <h2>📊 Benchmark Results</h2>
                <button id="close-modal-btn" class="close-modal-btn">✕</button>
            </div>
            <div class="benchmark-modal-body" id="benchmark-results-container">
                <!-- Results will be dynamically inserted here -->
            </div>
        </div>
    </div>

    <script src="game.js"></script>
    <script src="benchmark.js"></script>
</body>
</html>
